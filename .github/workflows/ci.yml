name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Syntax check (server, client, scripts, tests)
        run: npm run check:syntax
      - name: Run test suite
        run: npm test
      - name: Verify mobile bundle builds
        run: npm run mobile:build
