name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json
      - name: Install app dependencies
        run: npm ci
      - name: Install document worker dependencies
        run: npm ci --prefix worker
      - name: Syntax check (server, client, scripts, tests)
        run: npm run check:syntax
      - name: Verify CSS split against baseline
        run: npm run check:css-split
      - name: Run test suite
        run: npm test
      - name: Verify mobile bundle builds
        run: npm run mobile:build
