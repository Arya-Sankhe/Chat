<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrofChat</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Conversations">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">C</div>
          <div>
            <strong>CrofChat</strong>
            <span id="connectionLabel">Disconnected</span>
          </div>
        </div>

        <button class="primary-action" id="newChatButton" type="button">New chat</button>
        <nav class="conversation-list" id="conversationList" aria-label="Saved conversations"></nav>
      </aside>

      <main class="chat-panel">
        <header class="topbar">
          <button class="icon-button mobile-only" id="sidebarButton" type="button" aria-label="Toggle conversations">Menu</button>
          <div class="model-picker">
            <label for="modelInput">Model</label>
            <input id="modelInput" list="modelOptions" autocomplete="off" spellcheck="false" placeholder="Select model">
            <datalist id="modelOptions"></datalist>
          </div>
          <button class="secondary-action" id="refreshModelsButton" type="button">Refresh models</button>
          <button class="icon-button" id="settingsButton" type="button" aria-label="Open settings">Settings</button>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <section class="composer-shell" aria-label="Message composer">
          <div class="image-url-row">
            <form class="image-url-form" id="imageUrlForm">
              <input id="imageUrlInput" type="url" autocomplete="off" spellcheck="false" placeholder="https://image.example/file.png">
              <button class="secondary-action compact" type="submit">Add image</button>
            </form>
            <div class="image-chip-list" id="imageUrlRow"></div>
          </div>
          <div class="composer">
            <textarea id="promptInput" rows="1" placeholder="Message CrofAI" spellcheck="true"></textarea>
            <button class="primary-action compact" id="sendButton" type="button">Send</button>
            <button class="danger-action compact hidden" id="stopButton" type="button">Stop</button>
          </div>
        </section>
      </main>

      <aside class="settings-drawer" id="settingsDrawer" aria-label="Settings" aria-hidden="true">
        <div class="drawer-header">
          <strong>Settings</strong>
          <button class="icon-button" id="closeSettingsButton" type="button" aria-label="Close settings">Close</button>
        </div>

        <div class="field-group">
          <label for="apiKeyInput">CrofAI API key</label>
          <input id="apiKeyInput" type="password" autocomplete="off" spellcheck="false" placeholder="sk-...">
          <label class="check-row">
            <input id="rememberKeyInput" type="checkbox">
            <span>Remember key on this device</span>
          </label>
        </div>

        <div class="field-group">
          <label for="baseUrlInput">Endpoint</label>
          <select id="baseUrlInput"></select>
        </div>

        <div class="field-grid">
          <label>
            <span>Temperature</span>
            <input id="temperatureInput" type="number" min="0" max="2" step="0.1">
          </label>
          <label>
            <span>Top P</span>
            <input id="topPInput" type="number" min="0" max="1" step="0.05">
          </label>
          <label>
            <span>Max tokens</span>
            <input id="maxTokensInput" type="number" min="1" step="1">
          </label>
          <label>
            <span>Seed</span>
            <input id="seedInput" type="number" min="0" step="1">
          </label>
        </div>

        <div class="field-group">
          <label for="stopInput">Stop sequences</label>
          <textarea id="stopInput" rows="3" spellcheck="false"></textarea>
        </div>

        <div class="field-group">
          <label for="systemPromptInput">System prompt</label>
          <textarea id="systemPromptInput" rows="4" spellcheck="true"></textarea>
        </div>

        <div class="field-group">
          <label for="toolsInput">Tools JSON</label>
          <textarea id="toolsInput" rows="7" spellcheck="false" placeholder="[]"></textarea>
        </div>

        <div class="model-details" id="modelDetails"></div>
      </aside>

      <div class="overlay" id="overlay" hidden></div>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
