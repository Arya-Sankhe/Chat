<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1f1f1f">
    <title>Klui is offline</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, system-ui, sans-serif; }
      body { min-height: 100dvh; margin: 0; display: grid; place-items: center; background: Canvas; color: CanvasText; }
      main { width: min(420px, calc(100% - 40px)); text-align: center; }
      img { width: 72px; height: 72px; border-radius: 18px; }
      h1 { margin: 22px 0 8px; font-size: 24px; font-weight: 600; }
      p { margin: 0 0 22px; color: GrayText; line-height: 1.5; }
      button { border: 1px solid ButtonBorder; border-radius: 9px; padding: 10px 18px; background: ButtonFace; color: ButtonText; font: inherit; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png?v=mobile-v1" alt="">
      <h1>You’re offline</h1>
      <p>Klui needs an internet connection to chat and access your files.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
