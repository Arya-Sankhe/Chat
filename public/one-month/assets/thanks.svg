<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- 3D Puffed Rim Gradient -->
    <linearGradient id="cooeeRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="85%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
    
    <!-- 3D Inner Face Radial Gradient -->
    <radialGradient id="cooeeFace" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f0f9ff"/>
      <stop offset="85%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </radialGradient>

    <!-- 3D Inset Eye Gradient -->
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="45%" stop-color="#2563eb"/>
      <stop offset="80%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>

    <!-- Soft diffuse blue drop-shadow -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Cooee Mascot -->
  <g transform="translate(10, 15)">
    <!-- 1. Soft blue diffuse glow -->
    <rect x="42" y="32" width="116" height="116" rx="36" fill="#ffffff" filter="url(#softGlow)"/>

    <!-- 2. Puffed Rim -->
    <rect x="42" y="32" width="116" height="116" rx="36" fill="url(#cooeeRim)"/>
    
    <!-- 3. Inner face -->
    <rect x="50" y="40" width="100" height="100" rx="28" fill="url(#cooeeFace)"/>

    <!-- 4. Happy curved eyes (smiling) -->
    <path d="M 68 80 Q 78 68 88 80" fill="none" stroke="url(#eyeGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 112 80 Q 122 68 132 80" fill="none" stroke="url(#eyeGrad)" stroke-width="4.5" stroke-linecap="round"/>

    <!-- 5. Smile -->
    <path d="M 88 112 Q 100 122 112 112" fill="none" stroke="url(#eyeGrad)" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- Giant Heart in front of Mascot -->
  <path d="M 100 102 C 92 82, 54 82, 54 112 C 54 142, 100 166, 100 166 C 100 166, 146 142, 146 112 C 146 82, 108 82, 100 102 Z" fill="#ff4b4b" stroke="#1e3a8a" stroke-width="3.5" stroke-linejoin="round"/>
</svg>
