<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Klui home — greeting mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #1c1c1c;
    --panel: #252525;
    --line: #333;
    --text: #f2f2f2;
    --muted: #8a8a8a;
    --blue: #4f7cff;
    --klui-face: #4f74b8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: Inter, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 56px 1fr;
    height: 100%;
    min-height: 100vh;
  }

  .rail {
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; padding: 14px 0 16px;
    border-right: 1px solid #222;
  }
  .rail button {
    width: 34px; height: 34px; border: 0; border-radius: 10px;
    background: transparent; color: #aaa; cursor: pointer;
    display: grid; place-items: center;
  }
  .rail button:hover { background: #2a2a2a; color: #fff; }
  .rail svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .rail .spacer { flex: 1; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #7aa2ff, #3b6fe0);
    color: #fff; font: 700 10px Inter, sans-serif;
    display: grid; place-items: center;
  }

  .main { position: relative; display: flex; flex-direction: column; min-width: 0; }
  .top-right {
    position: absolute; top: 14px; right: 18px;
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid #333; background: #222; color: #888;
    display: grid; place-items: center; cursor: pointer;
  }
  .top-right svg { width: 16px; height: 16px; }

  .stage {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px 28px;
    gap: 14px;
  }

  /* one line: Klui + typing greeting, centered over composer */
  .hero-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: min(720px, 100%);
    min-height: 52px;
  }

  .klui {
    width: 48px; height: 48px;
    flex: 0 0 auto;
    transform-origin: 50% 80%;
    animation: idle-bob 3.8s ease-in-out infinite;
  }
  @keyframes idle-bob {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-2px) rotate(1deg); }
  }
  .klui-svg {
    width: 100%; height: 100%;
    overflow: visible; display: block;
    filter: drop-shadow(0 4px 10px rgba(90,140,230,.3));
  }
  .eyes { transform-box: fill-box; transform-origin: center; animation: blink 5s infinite; }
  @keyframes blink {
    0%, 94%, 100% { transform: scaleY(1); }
    97% { transform: scaleY(.1); }
  }
  .fx { opacity: 0; pointer-events: none; transition: opacity .2s ease; }
  .fx.is-on { opacity: 1; }

  /* moods */
  .klui[data-mood="hello"] { animation: wave 1s ease-in-out; }
  @keyframes wave {
    0%,100% { transform: rotate(0); }
    30% { transform: rotate(-7deg) translateY(-2px); }
    60% { transform: rotate(6deg) translateY(-1px); }
  }
  .klui[data-mood="curious"] .eyes { animation: blink 5s infinite, peek 2s ease-in-out infinite; }
  @keyframes peek {
    0%,100% { translate: 0 0; }
    40% { translate: 2.5px -1px; }
    70% { translate: -2px 1px; }
  }
  .klui[data-mood="think"] .eyes { animation: blink 5s infinite, look-up 2.4s ease-in-out infinite; }
  @keyframes look-up {
    0%,25%,100% { translate: 0 0; }
    50%,75% { translate: 2px -2.5px; }
  }
  .klui[data-mood="think"] .fx-think { opacity: 1; }
  .fx-think circle { opacity: 0; animation: tdot 1.8s ease-in-out infinite; }
  .fx-think circle:nth-child(2) { animation-delay: .25s; }
  .fx-think circle:nth-child(3) { animation-delay: .5s; }
  @keyframes tdot {
    0%,100% { opacity: 0; transform: translateY(2px); }
    40%,70% { opacity: 1; transform: translateY(0); }
  }
  .klui[data-mood="wink"] .eye-r { animation: wink .9s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  @keyframes wink {
    0%,55%,100% { transform: scaleY(1); }
    65%,80% { transform: scaleY(.08); }
  }
  .klui[data-mood="spark"] .eye { opacity: 0; }
  .klui[data-mood="spark"] .fx-stars { opacity: 1; animation: twinkle 1.1s ease-in-out infinite; transform-origin: 40px 32px; }
  @keyframes twinkle { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12) rotate(6deg); } }
  .klui[data-mood="spark"] .fx-sparkles { opacity: 1; }
  .fx-sparkles path { fill: #ffd76a; opacity: 0; animation: spark 1.5s ease-in-out infinite; }
  .fx-sparkles path:nth-child(2) { animation-delay: .4s; }
  .fx-sparkles path:nth-child(3) { animation-delay: .85s; }
  @keyframes spark { 0%,100% { opacity: 0; transform: scale(.4); } 40%,65% { opacity: 1; transform: scale(1); } }
  .klui[data-mood="happy"] .eye { opacity: 0; }
  .klui[data-mood="happy"] .fx-happy { opacity: 1; }
  .klui[data-mood="sleepy"] .eye { height: 5px; y: 31; }
  .klui[data-mood="sleepy"] .eyes { animation: none; }

  .type-line {
    display: flex;
    align-items: center;
    min-width: 0;
    font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -.01em;
    line-height: 1.25;
    color: var(--text);
  }
  .type-text { white-space: nowrap; overflow: hidden; }
  .caret {
    display: inline-block;
    width: .55em;
    height: 1.05em;
    margin-left: 3px;
    background: var(--text);
    border-radius: 1px;
    vertical-align: -0.12em;
    animation: caret-blink 1.05s steps(1) infinite;
    flex: 0 0 auto;
  }
  @keyframes caret-blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .caret.is-solid { animation: none; opacity: 1; }

  .composer {
    width: min(720px, 100%);
    background: var(--panel);
    border: 1px solid #3a3a3a;
    border-radius: 22px;
    padding: 14px 14px 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,.28);
  }
  .composer-input {
    width: 100%;
    border: 0; outline: none; resize: none;
    background: transparent;
    color: var(--text);
    font: 400 15px/1.45 Inter, sans-serif;
    min-height: 28px;
    padding: 2px 4px 12px;
  }
  .composer-input::placeholder { color: #6e6e6e; }
  .composer-row { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid #3a3a3a; background: #2c2c2c;
    color: #bbb; display: grid; place-items: center; cursor: pointer;
    flex: 0 0 auto;
  }
  .icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .pills { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 32px; padding: 0 12px;
    border-radius: 999px;
    border: 1px solid #3a3a3a;
    background: #2c2c2c;
    color: #ddd;
    font: 500 13px Inter, sans-serif;
    cursor: pointer;
  }
  .pill.active { background: #353535; border-color: #4a4a4a; color: #fff; }
  .pill svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .send {
    width: 36px; height: 36px; border-radius: 50%;
    border: 0; background: var(--blue); color: #fff;
    display: grid; place-items: center; cursor: pointer;
    flex: 0 0 auto;
  }
  .send svg { width: 15px; height: 15px; fill: currentColor; }

  .note {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #555; white-space: nowrap;
  }
</style>
</head>
<body>
<div class="app">
  <aside class="rail" aria-label="Sidebar">
    <button aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg></button>
    <button aria-label="New chat"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    <button aria-label="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="M16 16l4.5 4.5"/></svg></button>
    <button aria-label="Library"><svg viewBox="0 0 24 24"><path d="M5 5h6v14H5zM13 5h6v14h-6z"/></svg></button>
    <button aria-label="Projects"><svg viewBox="0 0 24 24"><path d="M4 8h16v11H4zM8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
    <div class="spacer"></div>
    <div class="avatar">AN</div>
  </aside>

  <main class="main">
    <button class="top-right" aria-label="Account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M12 12v.01"/></svg>
    </button>

    <div class="stage">
      <div class="hero-line">
        <div class="klui" id="klui" data-mood="idle" aria-hidden="true">
          <svg class="klui-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="faceFill" cx="40%" cy="30%" r="68%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="62%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#e8f1fc"/>
              </radialGradient>
              <radialGradient id="rimGlow" cx="50%" cy="48%" r="58%">
                <stop offset="54%" stop-color="#9ec0f0" stop-opacity="0"/>
                <stop offset="76%" stop-color="#9ec0f0" stop-opacity=".55"/>
                <stop offset="100%" stop-color="#7eacf0" stop-opacity=".95"/>
              </radialGradient>
              <radialGradient id="hiLite" cx="30%" cy="22%" r="42%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
              </radialGradient>
              <linearGradient id="innerShade" x1="0" y1="0" x2="0" y2="1">
                <stop offset="55%" stop-color="#7eacf0" stop-opacity="0"/>
                <stop offset="100%" stop-color="#7eacf0" stop-opacity=".18"/>
              </linearGradient>
              <filter id="aura" x="-35%" y="-35%" width="170%" height="170%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="3.2" result="b"/>
                <feFlood flood-color="#8eb6f0" flood-opacity=".45" result="c"/>
                <feComposite in="c" in2="b" operator="in" result="g"/>
                <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <g filter="url(#aura)">
              <rect x="8" y="8" width="64" height="64" rx="21" ry="21" fill="url(#faceFill)"/>
              <rect x="8" y="8" width="64" height="64" rx="21" ry="21" fill="url(#rimGlow)"/>
              <rect x="8" y="8" width="64" height="64" rx="21" ry="21" fill="url(#hiLite)"/>
              <rect x="8" y="8" width="64" height="64" rx="21" ry="21" fill="url(#innerShade)"/>
              <rect x="9.2" y="9.2" width="61.6" height="61.6" rx="19.8" ry="19.8" fill="none" stroke="#a8c4ef" stroke-width="2.6" opacity=".85"/>
            </g>
            <g class="face">
              <g class="eyes">
                <rect class="eye eye-l" x="26" y="24" width="8" height="18" rx="4" fill="#4f74b8"/>
                <rect class="eye eye-r" x="46" y="24" width="8" height="18" rx="4" fill="#4f74b8"/>
                <g class="fx fx-stars" fill="#4f74b8">
                  <path d="M30 24.5 l1.9 4.6 4.6 1.9 -4.6 1.9 -1.9 4.6 -1.9 -4.6 -4.6 -1.9 4.6 -1.9z"/>
                  <path d="M50 24.5 l1.9 4.6 4.6 1.9 -4.6 1.9 -1.9 4.6 -1.9 -4.6 -4.6 -1.9 4.6 -1.9z"/>
                </g>
                <g class="fx fx-happy" fill="none" stroke="#4f74b8" stroke-width="3.4" stroke-linecap="round">
                  <path d="M24 34 Q30 26 36 34"/>
                  <path d="M44 34 Q50 26 56 34"/>
                </g>
              </g>
              <path class="mouth" d="M32 50 Q40 57 48 50" fill="none" stroke="#4f74b8" stroke-width="3.4" stroke-linecap="round"/>
            </g>
            <g class="fx fx-think" fill="#a8c4ef">
              <circle cx="64" cy="14" r="2.2"/>
              <circle cx="70" cy="7" r="3"/>
              <circle cx="77" cy="-1" r="3.8"/>
            </g>
            <g class="fx fx-sparkles">
              <path d="M8 10 l1.5 3.6 3.6 1.5 -3.6 1.5 -1.5 3.6 -1.5 -3.6 -3.6 -1.5 3.6 -1.5z"/>
              <path d="M68 58 l1.3 3.2 3.2 1.3 -3.2 1.3 -1.3 3.2 -1.3 -3.2 -3.2 -1.3 3.2 -1.3z"/>
              <path d="M66 4 l1.1 2.8 2.8 1.1 -2.8 1.1 -1.1 2.8 -1.1 -2.8 -2.8 -1.1 2.8 -1.1z"/>
            </g>
          </svg>
        </div>
        <div class="type-line" aria-live="polite">
          <span class="type-text" id="typeText"></span><span class="caret is-solid" id="caret"></span>
        </div>
      </div>

      <div class="composer">
        <textarea class="composer-input" rows="1" placeholder="Message Klui agent"></textarea>
        <div class="composer-row">
          <button class="icon-btn" aria-label="Add"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
          <div class="pills">
            <button class="pill active" type="button">Thinking <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button>
            <button class="pill" type="button"><svg viewBox="0 0 24 24"><path d="M4 7h7v10H4zM13 7h7v10h-7z"/></svg> Compare</button>
            <button class="pill" type="button"><svg viewBox="0 0 24 24"><circle cx="9" cy="10" r="2.2"/><circle cx="15" cy="10" r="2.2"/><path d="M5.5 17c1-2.2 2.8-3.2 5.5-3.2S15.5 14.8 16.5 17"/></svg> Council</button>
          </div>
          <button class="icon-btn" aria-label="Voice"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
          <button class="send" aria-label="Send"><svg viewBox="0 0 24 24"><path d="M5 12l14-7-5 14-2.5-5.5L5 12z"/></svg></button>
        </div>
      </div>
    </div>

    <div class="note">mockup only · terminal-style type / backspace</div>
  </main>
</div>

<script>
const LINES = [
  { text: "how can i help you?", mood: "hello", mouth: "M32 50 Q40 57 48 50" },
  { text: "what's cooking?", mood: "curious", mouth: "M33 51 Q40 54 47 51" },
  { text: "ready when you are_", mood: "wink", mouth: "M32 50 Q40 56 48 50" },
  { text: "got something on your mind?", mood: "think", mouth: "M33 51 Q40 55 47 51" },
  { text: "let's figure this out", mood: "spark", mouth: "M30 49 Q40 59 50 49" },
  { text: "what are we working on?", mood: "curious", mouth: "M33 51 Q40 54 47 51" },
  { text: "awaiting input...", mood: "sleepy", mouth: "M34 52 Q40 52 46 52" },
  { text: "your move", mood: "happy", mouth: "M29 49 Q40 61 51 49" },
];

const el = document.getElementById("typeText");
const caret = document.getElementById("caret");
const klui = document.getElementById("klui");
const mouth = document.querySelector(".mouth");

const TYPE_MS = 42;
const DELETE_MS = 28;
const HOLD_MS = 2600;
const GAP_MS = 420;

let i = 0;
let timer = null;

function sleep(ms) {
  return new Promise((resolve) => {
    clearTimeout(timer);
    timer = setTimeout(resolve, ms);
  });
}

function setMood(mood, mouthPath) {
  klui.dataset.mood = mood;
  if (mouthPath) mouth.setAttribute("d", mouthPath);
  if (mood === "hello") {
    klui.style.animation = "none";
    void klui.offsetWidth;
    klui.style.animation = "";
  }
}

async function typeText(text) {
  caret.classList.add("is-solid");
  for (let n = 1; n <= text.length; n++) {
    el.textContent = text.slice(0, n);
    await sleep(TYPE_MS + (Math.random() * 28));
  }
  caret.classList.remove("is-solid");
}

async function deleteText() {
  caret.classList.add("is-solid");
  let text = el.textContent;
  while (text.length) {
    text = text.slice(0, -1);
    el.textContent = text;
    await sleep(DELETE_MS);
  }
}

async function loop() {
  while (true) {
    const line = LINES[i % LINES.length];
    setMood(line.mood, line.mouth);
    await typeText(line.text);
    await sleep(HOLD_MS);
    await deleteText();
    await sleep(GAP_MS);
    i += 1;
  }
}

loop();
</script>
</body>
</html>
